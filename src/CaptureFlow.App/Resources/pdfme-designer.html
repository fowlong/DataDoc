<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptureFlow Document Designer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #designer-container { width: 100%; height: 100%; }
        #loading { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: #64748b; font-size: 14px; }
        #loading.hidden { display: none; }
        #error { display: none; padding: 20px; color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; margin: 20px; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="loading">Loading document designer...</div>
    <div id="error"></div>
    <div id="designer-container"></div>

    <!-- Local bundle — no internet required -->
    <script src="pdfme-bundle.js"></script>
    <script>
        (function() {
            const B = window.PdfmeBundle;
            let designer = null;
            const plugins = {
                text: B.text,
                multiVariableText: B.multiVariableText,
                image: B.image,
                svg: B.svg,
                Table: B.table,
                Line: B.line,
                Rectangle: B.rectangle,
                Ellipse: B.ellipse
            };

            // Add barcode types
            if (B.barcodes) {
                Object.entries(B.barcodes).forEach(function(entry) {
                    var key = entry[0], val = entry[1];
                    if (val && typeof val === 'object') plugins[key] = val;
                });
            }

            function showError(msg) {
                document.getElementById('loading').classList.add('hidden');
                var el = document.getElementById('error');
                el.style.display = 'block';
                el.textContent = 'Designer load error: ' + msg;
                postMessage({ type: 'error', message: msg });
            }

            function postMessage(data) {
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage(JSON.stringify(data));
                }
            }

            function arrayBufferToBase64(buffer) {
                var bytes = new Uint8Array(buffer);
                var binary = '';
                var chunkSize = 8192;
                for (var i = 0; i < bytes.length; i += chunkSize) {
                    var chunk = bytes.subarray(i, i + chunkSize);
                    binary += String.fromCharCode.apply(null, chunk);
                }
                return btoa(binary);
            }

            function initDesigner(template) {
                var domContainer = document.getElementById('designer-container');
                if (designer) {
                    try { designer.destroy(); } catch(e) {}
                }
                domContainer.innerHTML = '';

                designer = new B.Designer({
                    domContainer: domContainer,
                    template: template,
                    plugins: plugins,
                    options: {
                        sidebarOpen: true,
                        lang: 'en'
                    }
                });

                designer.onChangeTemplate(function(t) {
                    var fieldCount = t.schemas ? t.schemas.flat().length : 0;
                    postMessage({ type: 'templateChanged', fieldCount: fieldCount });
                });
            }

            // ---- API callable from C# via ExecuteScriptAsync ----
            window.pdfmeApi = {
                loadBasePdf: function(base64Pdf) {
                    try {
                        var template = designer ? designer.getTemplate() : { basePdf: B.BLANK_PDF, schemas: [[]] };
                        if (!base64Pdf.startsWith('data:')) {
                            base64Pdf = 'data:application/pdf;base64,' + base64Pdf;
                        }
                        template.basePdf = base64Pdf;
                        initDesigner(template);
                        postMessage({ type: 'basePdfLoaded' });
                    } catch (err) {
                        postMessage({ type: 'error', message: 'Failed to load base PDF: ' + err.message });
                    }
                },

                getTemplate: function() {
                    if (!designer) return JSON.stringify({ basePdf: B.BLANK_PDF, schemas: [[]] });
                    return JSON.stringify(designer.getTemplate());
                },

                setTemplate: function(templateJson) {
                    try {
                        var template = JSON.parse(templateJson);
                        initDesigner(template);
                        postMessage({ type: 'templateLoaded' });
                    } catch (err) {
                        postMessage({ type: 'error', message: 'Failed to load template: ' + err.message });
                    }
                },

                getFieldNames: function() {
                    if (!designer) return '[]';
                    var template = designer.getTemplate();
                    var names = template.schemas.flat().map(function(s) { return s.name; });
                    return JSON.stringify([...new Set(names)]);
                },

                generatePdf: async function(inputsJson, requestId) {
                    try {
                        var template = designer.getTemplate();
                        var inputs = JSON.parse(inputsJson);
                        var pdf = await B.generate({
                            template: template,
                            inputs: Array.isArray(inputs) ? inputs : [inputs],
                            plugins: plugins
                        });
                        var base64 = arrayBufferToBase64(pdf);
                        postMessage({ type: 'generateResult', requestId: requestId, data: base64 });
                    } catch (err) {
                        postMessage({ type: 'generateError', requestId: requestId, error: err.message });
                    }
                },

                getPageCount: function() {
                    if (!designer) return 1;
                    var template = designer.getTemplate();
                    return template.schemas ? template.schemas.length : 1;
                }
            };

            // ---- Initialize ----
            try {
                document.getElementById('loading').classList.add('hidden');
                var defaultTemplate = {
                    basePdf: B.BLANK_PDF,
                    schemas: [[]]
                };
                initDesigner(defaultTemplate);
                postMessage({ type: 'ready' });
            } catch (err) {
                showError(err.message);
            }
        })();
    </script>
</body>
</html>
